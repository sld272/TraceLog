# ============================================================================
# TraceLog 演示数据内容 —— 自由发挥区
# ============================================================================
# 用法：把本文件复制成同目录下的 demo_content.toml，再随意编辑。
#   cp scripts/demo_content.example.toml scripts/demo_content.toml
# demo_content.toml 已被 .gitignore，不会上传；seeder 优先读它，没有就回退到本示例。
#
# 三种条目：
#   [[posts]]           公开记录。key 必须唯一；comment_threads 用 post_key 绑定到它，
#                       所以你随便增删、重排帖子，追问都不会错位。
#                       时间用 month/day/hour/minute，脚本会自动按时间排序。
#                       act 只是分幕标签，dry-run 里用来看分布，随便写。
#   [[comment_threads]] 在某帖的某个 SOUL 首评下，用户再追问一句（生成一轮真实对话）。
#                       post_key 必须对得上某条 posts 的 key。
#   [[chats]]           与某个 SOUL 的私聊（保持近期时间，展示“当前在用”）。
#
# 注意：
#   - soul_name 只能是已启用的人格（默认库：拾迹者 / 温柔树洞 / 毒舌好友）。写错会被跳过、不会崩。
#   - 改完先 `python scripts/seed_demo_data.py --dry-run` 预览时间线和绑定。
#   - 成长弧线（怀疑→笃定）是 user.md 那个 revise 镜头的素材；个别帖子内嵌了带绝对日期的
#     自然待办给 TodoTool 抽——大改时心里有数。
#   - 文件保持 UTF-8。
# ============================================================================


