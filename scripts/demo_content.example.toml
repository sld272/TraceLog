# ============================================================================
# TraceLog demo content template
# ============================================================================
# Copy this file to scripts/demo_content.toml, then replace the placeholder
# content with your own demo story.
#
#   cp scripts/demo_content.example.toml scripts/demo_content.toml
#
# scripts/demo_content.toml is ignored by git, so real demo content should live
# there instead of in this example file.
#
# Required sections:
#   [[posts]]
#     key      Unique stable id. comment_threads bind to posts by this key.
#     month    1-12
#     day      1-31
#     hour     0-23
#     minute   0-59
#     act      Optional grouping label shown in dry-run output.
#     content  Public post text.
#
#   [[comment_threads]]
#     post_key  Must match one [[posts]].key.
#     soul_name Existing enabled SOUL name, for example: 拾迹者 / 温柔树洞 / 毒舌好友.
#     followup User follow-up under that SOUL's first comment.
#     month/day/hour/minute are optional. If present, they set the follow-up time.
#
#   [[chats]]
#     soul_name Existing enabled SOUL name.
#     message   Private chat user message.
#     month/day/hour/minute are optional. If present, they set the user message time.
#
# Keep this file as documentation plus tiny placeholders only. Put real demo
# data in scripts/demo_content.toml.
# ============================================================================


[[posts]]
key = "sample-start"
month = 3
day = 1
hour = 9
minute = 0
act = "示例分幕"
content = "示例公开记录：把这里替换成你的第一条 demo 内容。"

[[posts]]
key = "sample-followup"
month = 3
day = 2
hour = 20
minute = 30
act = "示例分幕"
content = "示例公开记录：把这里替换成另一条 demo 内容，可以包含一个明确待办。"


[[comment_threads]]
post_key = "sample-start"
soul_name = "拾迹者"
month = 3
day = 1
hour = 11
minute = 20
followup = "示例追问：把这里替换成用户想继续聊的一句话。"


[[chats]]
soul_name = "温柔树洞"
month = 3
day = 3
hour = 22
minute = 10
message = "示例私聊：把这里替换成用户和某个 SOUL 的一对一消息。"
